name: Execute Uptime Engine

on:
  push:
    branches:
      - main
    paths:
      - 'sites.json'
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: uptime-monitor
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/uptime-data'
          token: ${{ secrets.DATA_REPO_PAT }}
          path: 'data-store'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node monitor.js

      - run: |
          cd data-store
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || (git commit -m "chore: log metrics update [skip ci]" && git push)
